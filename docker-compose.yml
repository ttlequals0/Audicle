# Audicle: app (UI/API/RSS + worker) plus the GPU TTS wrapper. Images come from
# Docker Hub; add your own exposure layer (tunnel/reverse proxy) for the feed.

services:
  app:
    image: ttlequals0/audicle:latest
    # The image already runs as a non-root user (uid 1000). If you set `user:`
    # or bind-mount host dirs, make those dirs writable by uid 1000:
    #   chown -R 1000:1000 ./data ./backend/app/prompts ./backend/app/corrections ./backend/app/reference
    # The app seeds default prompt/corrections into empty mounts on first boot,
    # which only works if uid 1000 can write to them.
    # user: "1000:1000"
    ports:
      - "8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
      # Bind mounts target /app/app/* (the Dockerfile copies backend/app there);
      # host edits show up at the path the code reads from. An empty mount is
      # seeded with the packaged default on first boot.
      - ./backend/app/prompts:/app/app/prompts
      - ./backend/app/corrections:/app/app/corrections
      - ./backend/app/reference:/app/app/reference
    depends_on:
      # service_started, not service_healthy: the app boots and configures TTS
      # at runtime (voice upload via the UI). Gating on wrapper readiness would
      # deadlock -- the wrapper is 503 until a reference voice is committed.
      tts-wrapper:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  tts-wrapper:
    # GPU-pinned, one uvicorn worker. For CPU-only hosts use the
    # ttlequals0/audicle-tts:*-cpu image and set TTS_DEVICE=cpu (5-10x slower).
    image: ttlequals0/audicle-tts:latest
    environment:
      - TTS_DEVICE=${TTS_DEVICE:-cuda}
      - TTS_LANGUAGE=${TTS_LANGUAGE:-en}
      - DATA_DIR=/data
      - TTS_REFERENCE_PATH=/app/reference/voice.wav
      - XTTS_TEMPERATURE=${XTTS_TEMPERATURE:-0.65}
      - XTTS_LENGTH_PENALTY=${XTTS_LENGTH_PENALTY:-1.0}
      - XTTS_REPETITION_PENALTY=${XTTS_REPETITION_PENALTY:-2.0}
      - XTTS_TOP_K=${XTTS_TOP_K:-50}
      - XTTS_TOP_P=${XTTS_TOP_P:-0.85}
    volumes:
      - ./data:/data
      # Reference voice: read-only here; the app writes voice.wav (host edit or
      # UI upload) and the wrapper reloads it. No voice yet just means /generate
      # is unavailable until one is committed.
      - ./backend/app/reference:/app/reference:ro
      # ~2 GB of XTTS-v2 weights downloads on first run; cache the result.
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      # Liveness (model loaded), not readiness: the app's depends_on gates on
      # this, and a voice can be uploaded via the UI only after the app starts.
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    # Match the app service security posture: no-new-privileges + cap_drop.
    # The nvidia runtime grants device access via the deploy.resources block,
    # so dropping caps here doesn't break GPU access.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  hf_cache:

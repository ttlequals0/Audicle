# Audicle: app (UI/API/RSS + worker) plus the GPU TTS wrapper. Images come from
# Docker Hub; add your own exposure layer (tunnel/reverse proxy) for the feed.

services:
  app:
    image: ttlequals0/audicle:latest
    # The image already runs as a non-root user (uid 1000). If you set `user:`
    # or bind-mount host dirs, make those dirs writable by uid 1000:
    #   chown -R 1000:1000 ./data ./backend/app/prompts ./backend/app/corrections ./backend/app/reference
    # The app seeds default prompt/corrections into empty mounts on first boot,
    # which only works if uid 1000 can write to them.
    # user: "1000:1000"
    ports:
      - "8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
      # As of 0.12.0 the cleanup/summary prompts and pronunciation corrections
      # are DB-backed (default ships in the image, edits live in the settings
      # table). The prompts/ and corrections/ mounts are now vestigial: kept only
      # so the 011 migration can import a pre-0.12.0 on-disk pronunciation.json on
      # first boot. They can be dropped once every deployment is post-import.
      # The reference voices (voices/slot{n}.wav) are real media files shared with
      # the wrapper, so the reference dir stays a bind mount.
      - ./backend/app/prompts:/app/app/prompts
      - ./backend/app/corrections:/app/app/corrections
      - ./backend/app/reference:/app/app/reference
    depends_on:
      # service_started, not service_healthy: the app boots and configures TTS
      # at runtime (voice upload via the UI). Gating on wrapper readiness would
      # deadlock -- the wrapper is 503 until a voice slot is uploaded.
      tts-wrapper:
        condition: service_started
      # No depends_on for the render sidecar: it is optional enrichment and the app
      # tolerates it being down or absent (render.fetch fails closed to the cascade
      # result), so it must not gate app startup or block `up` if its image is missing.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  render:
    # Stealth headful-render sidecar (Camoufox + xvfb), CPU-only. Clicks the
    # "EXPAND TO CONTINUE READING" gate to recover full article bodies (e.g.
    # inc.com). Internal only -- never expose this; the app reaches it at
    # RENDER_URL=http://render:8000 (set in .env). Disable by clearing RENDER_URL.
    image: ttlequals0/audicle-render:latest
    # Headful Firefox needs a large /dev/shm or it crashes mid-render; the Docker
    # default (64m) is too small.
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    # no-new-privileges, but NOT cap_drop: ALL like the other services -- a headful
    # Firefox under xvfb can need more latitude than a plain web app. Tighten with
    # cap_drop once validated against the live browser if you want to harden further.
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  tts-wrapper:
    # GPU-pinned, one uvicorn worker. For CPU-only hosts use the
    # ttlequals0/audicle-tts:*-cpu image and set TTS_DEVICE=cpu (5-10x slower).
    image: ttlequals0/audicle-tts:latest
    environment:
      - TTS_DEVICE=${TTS_DEVICE:-cuda}
      - TTS_LANGUAGE=${TTS_LANGUAGE:-en}
      - DATA_DIR=/data
      # Anchor for the slots dir: the wrapper conditions on voices/slot{n}.wav next
      # to this path (its lowest filled slot at boot). The voice.wav file itself is
      # no longer required (slots-only since 0.35.0).
      - TTS_REFERENCE_PATH=/app/reference/voice.wav
      # Generation knobs (temperature, repetition penalty, top_p, top_k, seed,
      # max chars) are NOT env vars (0.44.0): the backend sends them on every
      # /generate call, tunable live in Settings. SAMPLE_RATE is provisional
      # (the model's own rate replaces it at load).
      - TTS_SAMPLE_RATE=${TTS_SAMPLE_RATE:-24000}
      # Post-TTS ASR verification (off by default). WHISPER_ENABLED loads the
      # faster-whisper model here; the backend's WHISPER_VERIFY_ENABLED (via .env)
      # decides whether to request a transcript per chunk. WHISPER_DEVICE defaults
      # to TTS_DEVICE and WHISPER_COMPUTE_TYPE to a matching type (cuda -> float16,
      # cpu -> int8); add them here only to override.
      - WHISPER_ENABLED=${WHISPER_ENABLED:-false}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
    volumes:
      - ./data:/data
      # Reference voices: read-only here; the app writes voices/slot{n}.wav (host
      # edit or UI upload) and the wrapper selects/reloads them. No slot yet just
      # means /generate is unavailable until one is uploaded.
      - ./backend/app/reference:/app/reference:ro
      # Multi-GB model weights download on first run (Chatterbox from HuggingFace,
      # and the faster-whisper model when WHISPER_ENABLED=true). HF_HOME/TTS_HOME
      # point at /data/hf_cache and /data/tts_home (see the wrapper Dockerfile), so
      # the ./data bind mount above already persists them across recreation -- no
      # separate cache volume needed.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    healthcheck:
      # Liveness (model loaded), not readiness: the app's depends_on gates on
      # this, and a voice can be uploaded via the UI only after the app starts.
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Generous: first boot downloads multi-GB model weights before loading.
      start_period: 300s
    restart: unless-stopped
    # Match the app service security posture: no-new-privileges + cap_drop.
    # The nvidia runtime grants device access via the deploy.resources block,
    # so dropping caps here doesn't break GPU access.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

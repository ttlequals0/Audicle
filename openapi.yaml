openapi: 3.1.0
info:
  title: Audicle
  version: 0.39.1
paths:
  /health/live:
    get:
      tags:
      - health
      summary: Health Live
      operationId: health_live_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Live Health Live Get
  /health:
    get:
      tags:
      - health
      summary: Health Ready
      operationId: health_ready_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Ready Health Get
  /health/ready:
    get:
      tags:
      - health
      summary: Health Ready
      operationId: health_ready_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Ready Health Ready Get
  /api/v1/auth/status:
    get:
      tags:
      - auth
      summary: Get Status
      operationId: get_status_api_v1_auth_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__auth__StatusResponse'
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Post Login
      operationId: post_login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthActionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: Post Logout
      operationId: post_logout_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: boolean
                type: object
                title: Response Post Logout Api V1 Auth Logout Post
  /api/v1/auth/password:
    put:
      tags:
      - auth
      summary: Put Password
      operationId: put_password_api_v1_auth_password_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthActionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/submit:
    post:
      tags:
      - jobs
      summary: Submit an article URL for processing
      operationId: submit_api_v1_submit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/upload:
    post:
      tags:
      - jobs
      summary: Upload a document (PDF/DOCX/Markdown/text/HTML) for processing
      operationId: upload_api_v1_upload_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_api_v1_upload_post'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/upload/{episode_id}/reprocess:
    post:
      tags:
      - jobs
      summary: Reprocess an uploaded episode from its stored original
      operationId: reprocess_upload_api_v1_upload__episode_id__reprocess_post
      parameters:
      - name: episode_id
        in: path
        required: true
        schema:
          type: string
          title: Episode Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/status/{job_id}:
    get:
      tags:
      - jobs
      summary: Fetch job status
      operationId: status_api_v1_status__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app__api__v1__status__StatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/prompt:
    get:
      tags:
      - prompt
      summary: Read the cleanup prompt
      operationId: read_prompt_api_v1_prompt_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
    put:
      tags:
      - prompt
      summary: Replace the cleanup prompt
      operationId: write_prompt_api_v1_prompt_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - prompt
      summary: Reset the cleanup prompt to default
      operationId: reset_prompt_api_v1_prompt_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
  /api/v1/corrections:
    get:
      tags:
      - corrections
      summary: Read the user pronunciation corrections
      operationId: read_corrections_api_v1_corrections_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Read Corrections Api V1 Corrections Get
    put:
      tags:
      - corrections
      summary: Replace the user pronunciation corrections
      operationId: write_corrections_api_v1_corrections_put
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Body
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Write Corrections Api V1 Corrections Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - corrections
      summary: Clear the user pronunciation corrections
      operationId: reset_corrections_api_v1_corrections_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Reset Corrections Api V1 Corrections Delete
  /api/v1/corrections/seed:
    get:
      tags:
      - corrections
      summary: Read the built-in seed corrections (read-only)
      operationId: read_seed_corrections_api_v1_corrections_seed_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Read Seed Corrections Api V1 Corrections Seed Get
  /api/v1/corrections/lookup:
    get:
      tags:
      - corrections
      summary: Look up a term in the full lexicon
      operationId: lookup_correction_api_v1_corrections_lookup_get
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 100
          title: Q
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Lookup Correction Api V1 Corrections Lookup Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/corrections/export:
    get:
      tags:
      - corrections
      summary: Export corrections as JSON or PLS
      operationId: export_corrections_api_v1_corrections_export_get
      parameters:
      - name: format
        in: query
        required: false
        schema:
          type: string
          pattern: ^(json|pls)$
          default: json
          title: Format
      - name: scope
        in: query
        required: false
        schema:
          type: string
          pattern: ^(user|all)$
          default: user
          title: Scope
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/source-fallbacks:
    get:
      tags:
      - source-fallbacks
      summary: Read paywall extraction fallback config
      operationId: read_source_fallbacks_api_v1_source_fallbacks_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Read Source Fallbacks Api V1 Source Fallbacks Get
    put:
      tags:
      - source-fallbacks
      summary: Replace paywall extraction fallback config
      operationId: write_source_fallbacks_api_v1_source_fallbacks_put
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Body
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Write Source Fallbacks Api V1 Source Fallbacks Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/source-fallbacks/test:
    post:
      tags:
      - source-fallbacks
      summary: Test the bypass config against one URL
      description: 'Run the stored bypass config against ``url`` once and report what
        came back, so

        the operator can confirm a rule (and its cookie jar) actually fetches the
        article.

        Uses the real stored cookies but never echoes them -- only a char count, the

        strategy that matched, and a short text sample of the extracted article.'
      operationId: test_source_fallback_api_v1_source_fallbacks_test_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Body
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Test Source Fallback Api V1 Source Fallbacks Test
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/purge:
    post:
      tags:
      - maintenance
      summary: Post Purge
      operationId: post_purge_api_v1_purge_post
      parameters:
      - name: confirm
        in: query
        required: false
        schema:
          type: boolean
          description: Must be true to acknowledge the destructive action.
          default: false
          title: Confirm
        description: Must be true to acknowledge the destructive action.
      - name: older_than_days
        in: query
        required: false
        schema:
          type: integer
          maximum: 100000
          minimum: 0
          description: Purge episodes older than N days. 0 wipes everything.
          default: 0
          title: Older Than Days
        description: Purge episodes older than N days. 0 wipes everything.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurgeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/feed/recreate:
    post:
      tags:
      - maintenance
      summary: Post Feed Recreate
      operationId: post_feed_recreate_api_v1_feed_recreate_post
      parameters:
      - name: confirm
        in: query
        required: false
        schema:
          type: boolean
          description: Must be true to acknowledge the disruptive action.
          default: false
          title: Confirm
        description: Must be true to acknowledge the disruptive action.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedRecreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/settings:
    get:
      tags:
      - settings
      summary: Get Settings Overrides
      operationId: get_settings_overrides_api_v1_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
    put:
      tags:
      - settings
      summary: Put Settings Overrides
      operationId: put_settings_overrides_api_v1_settings_put
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              type: object
              title: Payload
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/episodes:
    get:
      tags:
      - episodes
      summary: List Episodes
      operationId: list_episodes_api_v1_episodes_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Per Page
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EpisodeListItem'
                title: Response List Episodes Api V1 Episodes Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/episodes/{episode_id}:
    delete:
      tags:
      - episodes
      summary: Delete Episode
      operationId: delete_episode_api_v1_episodes__episode_id__delete
      parameters:
      - name: episode_id
        in: path
        required: true
        schema:
          type: string
          title: Episode Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteEpisodeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/jobs:
    get:
      tags:
      - jobs
      summary: List Jobs
      operationId: list_jobs_api_v1_jobs_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - enum:
            - queued
            - processing
            - done
            - failed
            type: string
          - type: 'null'
          title: Status
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Per Page
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobListItem'
                title: Response List Jobs Api V1 Jobs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/jobs/{job_id}/requeue:
    post:
      tags:
      - jobs
      summary: Re-enqueue a job (reprocess a failed/finished run)
      operationId: requeue_job_api_v1_jobs__job_id__requeue_post
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/reference/slots:
    get:
      tags:
      - reference
      summary: List Slots
      operationId: list_slots_api_v1_reference_slots_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SlotInfo'
                type: array
                title: Response List Slots Api V1 Reference Slots Get
  /api/v1/reference/slots/{slot}:
    post:
      tags:
      - reference
      summary: Upload Slot
      description: 'Install or replace the clip in slot ``slot``. No /reload -- slots
        are

        selected per job via /select-voice.'
      operationId: upload_slot_api_v1_reference_slots__slot__post
      parameters:
      - name: slot
        in: path
        required: true
        schema:
          type: integer
          maximum: 5
          minimum: 1
          title: Slot
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_slot_api_v1_reference_slots__slot__post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Upload Slot Api V1 Reference Slots  Slot  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - reference
      summary: Clear Slot
      operationId: clear_slot_api_v1_reference_slots__slot__delete
      parameters:
      - name: slot
        in: path
        required: true
        schema:
          type: integer
          maximum: 5
          minimum: 1
          title: Slot
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Clear Slot Api V1 Reference Slots  Slot  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/reference/slots/{slot}/label:
    put:
      tags:
      - reference
      summary: Rename Slot
      operationId: rename_slot_api_v1_reference_slots__slot__label_put
      parameters:
      - name: slot
        in: path
        required: true
        schema:
          type: integer
          maximum: 5
          minimum: 1
          title: Slot
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_rename_slot_api_v1_reference_slots__slot__label_put'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Rename Slot Api V1 Reference Slots  Slot  Label Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/reference/slots/{slot}/preview:
    get:
      tags:
      - reference
      summary: Preview Slot
      operationId: preview_slot_api_v1_reference_slots__slot__preview_get
      parameters:
      - name: slot
        in: path
        required: true
        schema:
          type: integer
          maximum: 5
          minimum: 1
          title: Slot
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/reference/slots/{slot}/audition:
    post:
      tags:
      - reference
      summary: Audition Slot
      description: 'Synthesize a sample with slot ``slot``: selects it on the wrapper,
        generates,

        then reloads the wrapper''s resting voice so an audition never leaves the
        wrapper

        switched to the auditioned slot.'
      operationId: audition_slot_api_v1_reference_slots__slot__audition_post
      parameters:
      - name: slot
        in: path
        required: true
        schema:
          type: integer
          maximum: 5
          minimum: 1
          title: Slot
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_audition_slot_api_v1_reference_slots__slot__audition_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/llm/models:
    get:
      tags:
      - llm
      summary: List Models
      operationId: list_models_api_v1_llm_models_get
      parameters:
      - name: provider
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/llm/models/refresh:
    post:
      tags:
      - llm
      summary: Refresh Models
      operationId: refresh_models_api_v1_llm_models_refresh_post
      parameters:
      - name: provider
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/webhooks/test:
    post:
      tags:
      - webhooks
      summary: Test Webhook
      description: 'Deliver the sample payload once and report the outcome. 409 when
        no

        ``WEBHOOK_URL`` is configured.'
      operationId: test_webhook_api_v1_webhooks_test_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTestResult'
  /rss/{slug}.xml:
    get:
      tags:
      - rss
      summary: Get Rss
      operationId: get_rss_rss__slug__xml_get
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      - name: if-modified-since
        in: header
